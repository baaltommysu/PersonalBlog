<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人博客</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            background: #fafafa;
        }

        header {
            text-align: center;
            padding: 60px 0;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 2.5em;
            color: #1a1a1a;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        nav {
            margin: 30px 0;
            text-align: center;
        }

        nav a {
            color: #555;
            text-decoration: none;
            margin: 0 15px;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        nav a:hover {
            background: #333;
            color: #fff;
        }

        .post {
            background: #fff;
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .post:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .post h2 {
            color: #1a1a1a;
            margin-bottom: 10px;
            font-size: 1.5em;
        }

        .post .date {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .post p {
            color: #555;
            line-height: 1.8;
        }

        .post a {
            color: #333;
            text-decoration: none;
            font-weight: 600;
        }

        .post a:hover {
            text-decoration: underline;
        }

        footer {
            text-align: center;
            padding: 40px 0;
            color: #999;
            border-top: 1px solid #e0e0e0;
            margin-top: 40px;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8em;
            }

            nav a {
                display: inline-block;
                margin: 5px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <header>
        <h1>我的个人博客</h1>
        <p class="subtitle">记录生活，分享思考</p>
        <nav>
            <a href="#">首页</a>
            <a href="#">文章</a>
            <a href="#">关于</a>
            <a href="#">联系</a>
        </nav>
    </header>

    <main>
        <article class="post">
            <h2><a href="#">我的第一篇博客文章</a></h2>
            <p class="date">2026年4月7日</p>
            <p>欢迎来到我的博客！这里是我记录学习心得、生活感悟和技术探索的地方。希望能与志同道合的朋友一起交流成长。</p>
        </article>

        <article class="post">
            <h2><a href="#">如何开始写博客</a></h2>
            <p class="date">2026年4月6日</p>
            <p>写博客是一个很好的习惯，它可以帮助我们整理思路、记录成长。不需要完美的开始，重要的是持续地写下去。</p>
        </article>

        <article class="post">
            <h2><a href="#">关于这个网站</a></h2>
            <p class="date">2026年4月5日</p>
            <p>这是一个简洁的个人博客模板，使用纯 HTML 和 CSS 构建。你可以根据自己的需求进行修改和扩展。</p>
        </article>
    </main>

    <footer>
        <p>&copy; 2026 我的个人博客. All rights reserved.</p>
    </footer>
</body>
</html>
